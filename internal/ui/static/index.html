<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Copendex</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --ink: #1f2528;
        --muted: #687076;
        --line: #d9dedb;
        --accent: #0f766e;
        --accent-2: #a45115;
        --chip: #edf4f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      main {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: calc(100vh - 65px);
      }

      aside {
        padding: 20px;
        border-right: 1px solid var(--line);
        background: #fbfbf9;
      }

      section {
        padding: 20px 24px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      .stats {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .stat {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .stat strong {
        display: block;
        font-size: 20px;
      }

      .stat span,
      .count {
        color: var(--muted);
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        background: #f0f3f1;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .kind {
        display: inline-block;
        min-width: 64px;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--chip);
        color: var(--accent);
        text-align: center;
        font-size: 12px;
        font-weight: 700;
      }

      .file .kind {
        color: var(--accent-2);
      }

      .empty {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        header,
        section {
          padding-left: 16px;
          padding-right: 16px;
        }

        table {
          display: block;
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Copendex</h1>
      <div class="count" id="status"></div>
    </header>
    <main>
      <aside>
        <label for="query">Search</label>
        <input id="query" type="search" placeholder="Symbol or file path" autocomplete="off">
        <div class="stats" id="stats"></div>
      </aside>
      <section>
        <div class="toolbar">
          <strong>Dictions</strong>
          <span class="count" id="resultCount"></span>
        </div>
        <div id="results"></div>
      </section>
    </main>
    <script id="copendex-data" type="application/json">__COPENDEX_DATA__</script>
    <script>
      const data = JSON.parse(document.querySelector("#copendex-data").textContent);
      const query = document.querySelector("#query");
      const statusEl = document.querySelector("#status");
      const statsEl = document.querySelector("#stats");
      const resultsEl = document.querySelector("#results");
      const countEl = document.querySelector("#resultCount");

      const escapeHTML = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);

      function rank(q, value, filePath) {
        const needle = q.toLowerCase();
        const haystack = String(value || "").toLowerCase();
        if (!needle) return 10;
        if (haystack === needle) return 1;
        if (haystack.startsWith(needle)) return 2;
        if (haystack.includes(needle) && !filePath) return 3;
        if (haystack.includes(needle)) return 4;
        return 100;
      }

      function matches(result, q) {
        if (!q) return true;
        const needle = q.toLowerCase();
        return [
          result.name,
          result.kind,
          result.language,
          result.path,
          result.symbol && result.symbol.package
        ].some((value) => String(value || "").toLowerCase().includes(needle));
      }

      function sortedResults(results, q) {
        return results
          .filter((result) => matches(result, q))
          .map((result) => ({
            ...result,
            localRank: result.type === "file" ? rank(q, result.path, true) : rank(q, result.name, false)
          }))
          .sort((a, b) => a.localRank - b.localRank || String(a.name || "").localeCompare(String(b.name || "")) || a.path.localeCompare(b.path));
      }

      function renderStats() {
        const stats = data.stats;
        statusEl.textContent = `${stats.fileCount} files, ${stats.symbolCount} symbols`;
        statsEl.innerHTML = `
          <div class="stat"><strong>${stats.fileCount}</strong><span>Files</span></div>
          <div class="stat"><strong>${stats.symbolCount}</strong><span>Symbols</span></div>
          <div class="stat"><strong>${stats.languageCount}</strong><span>Languages</span></div>
          <div class="stat"><strong>${stats.indexSizeBytes}</strong><span>Index bytes</span></div>
        `;
      }

      function renderResults() {
        const q = query.value.trim();
        const results = sortedResults(data.results, q);
        countEl.textContent = `${results.length} results`;
        if (!results.length) {
          resultsEl.className = "empty";
          resultsEl.textContent = "No matches";
          return;
        }
        resultsEl.className = "";
        resultsEl.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Name</th>
                <th>Kind</th>
                <th>Path</th>
                <th>Line</th>
                <th>Package</th>
              </tr>
            </thead>
            <tbody>
              ${results.map((result) => {
                const symbol = result.symbol || {};
                const typeClass = result.type === "file" ? "file" : "";
                return `
                  <tr class="${typeClass}">
                    <td><span class="kind">${escapeHTML(result.type)}</span></td>
                    <td>${escapeHTML(result.name || "")}</td>
                    <td>${escapeHTML(result.kind || result.language || "")}</td>
                    <td><code>${escapeHTML(result.path)}</code></td>
                    <td>${escapeHTML(result.line || "")}</td>
                    <td>${escapeHTML(symbol.package || "")}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        `;
      }

      query.addEventListener("input", renderResults);
      renderStats();
      renderResults();
    </script>
  </body>
</html>
